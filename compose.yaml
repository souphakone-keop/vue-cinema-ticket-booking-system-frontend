# Frontend service definition for the Cinema Ticket Booking System.
#
# This repo only owns the `frontend` service below. Merge it into the
# backend team's docker-compose.yml (which already defines backend, redis,
# mongo, etc.) rather than running this file standalone.
#
# `context` must point at this repo's location relative to wherever the
# final compose file lives — adjust the path below to match.
services:
  frontend:
    build:
      context: ../vue-cinema-ticket-booking-system-frontend
      args:
        # Must be a URL the *browser* can reach (Vite bakes this in at
        # build time) — not an internal Docker network hostname.
        VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:80"
    depends_on:
      - backend


